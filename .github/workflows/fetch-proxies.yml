name: Auto Proxy Fetch

on:
  schedule:
    - cron: '0 */6 * * *'  # Chạy tự động mỗi 6 tiếng
  workflow_dispatch:        # Trigger bằng tay qua giao diện GitHub
  push:
    paths:
      - 'fetch_proxies.py' # Tự chạy khi script Python thay đổi
      - 'sources.txt'      # THÊM DÒNG NÀY: Tự chạy khi bạn chỉnh sửa file nguồn proxy

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Cấp quyền push file proxies.txt ngược lại repo
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run proxy fetcher
        run: python fetch_proxies.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add proxies.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Update proxy list [skip ci]" && git push)
