name: Auto Fetch and Verify Proxies

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

concurrency:
  group: proxy-master-group
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  proxy-master-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp aiohttp-socks geoip2 uvloop

    - name: Download GeoIP Databases
      run: |
        mkdir -p geoip
        wget -O geoip/GeoLite2-Country.mmdb https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb || true
        wget -O geoip/GeoLite2-ASN.mmdb https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-ASN.mmdb || true

    - name: Run Proxy Fetcher Script
      run: python fetch_proxies.py

    - name: Commit and Push Changes back to GitHub
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add proxies.txt sources.txt sub.txt api/
        if git diff-index --quiet HEAD --; then
          echo "No changes to update."
        else
          git commit -m "🤖 [Auto Bot] Updated clean proxies, updated API and sub.txt [skip ci]"
          git pull --rebase origin main
          git push origin main
        fi
